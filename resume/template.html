<header class="resume-header">
    <div class="name-section">
        <h1>$name$</h1>
        <p class="subheading">$subheading$</p>
    </div>
    <div class="contact-section">
        <div class="left-column">
            $for(left-column)$
            <p>$left-column$</p>
            $endfor$
        </div>
        <div class="right-column">
            $for(right-column)$
            <p>$right-column$</p>
            $endfor$
        </div>
    </div>
</header>
<div class="resume-body">
    $body$
</div>
